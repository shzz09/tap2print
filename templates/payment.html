<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment - Tap2Print</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh;">

    <div class="card shadow-lg p-4" style="max-width:500px; width:100%; border-radius:15px;">

        <h3 class="text-center mb-4">💳 Secure Payment</h3>

        <div class="mb-3">
            <strong>File:</strong> {{ job.filename }} <br>
            <strong>Copies:</strong> {{ job.copies }} <br>
            <strong>Color Mode:</strong> {{ job.color_mode }} <br>
            <strong>Total Amount:</strong> 
            <span class="text-success fw-bold fs-5">₹{{ job.price }}</span>
        </div>

        <hr>

        <h6 class="mb-3">Select Payment Method</h6>

        <div class="form-check">
            <input class="form-check-input" type="radio" name="payment_method" checked>
            <label class="form-check-label">
                UPI (Google Pay / PhonePe / Paytm)
            </label>
        </div>

        <div class="form-check">
            <input class="form-check-input" type="radio" name="payment_method">
            <label class="form-check-label">
                Debit / Credit Card
            </label>
        </div>

        <div class="form-check mb-4">
            <input class="form-check-input" type="radio" name="payment_method">
            <label class="form-check-label">
                Cash at Kiosk
            </label>
        </div>

        <form action="/pay/{{ job.job_id }}" method="POST">
            <button type="submit" class="btn btn-success w-100 py-2">
                Pay ₹{{ job.price }}
            </button>
        </form>

        <p class="text-muted text-center mt-3" style="font-size:13px;">
            🔒 This is a secure simulated payment gateway.
        </p>

    </div>

</div>

</body>
</html>
